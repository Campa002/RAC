<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generador de Contraseñas</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&family=IBM+Plex+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/styles/generadorDeContraseñas.css">
</head>
<body>

<main class="card">
  <div class="logo-wrapper">
    <img class="logo-RAC" src="src/Imagenes/Logo-RAC-sinfondo.png" alt="">
  </div>

  <h1 class="card__title">Generador de Contraseñas</h1>
  <p class="card__subtitle">Creá contraseñas seguras</p>

  <!-- Resultado -->
  <p class="password-output" id="passwordOutput" aria-live="polite">
    Tu contraseña aparecerá aquí
  </p>

  <!-- Indicador de fuerza -->
  <p class="strength-label" id="strengthLabel"></p>
  <div class="strength-bar-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
    <div class="strength-bar-fill" id="strengthBar"></div>
  </div>

  <!-- Longitud -->
  <div class="length-control">
    <label class="length-control__label" for="lengthSlider">
      Longitud: <strong id="lengthDisplay">12</strong> caracteres
    </label>
    <input
      class="length-control__slider"
      type="range"
      id="lengthSlider"
      min="6"
      max="32"
      value="12"
    >
  </div>

  <!-- Opciones de caracteres -->
  <label class="option-checkbox">
    <input type="checkbox" id="includeUppercase" checked>
    Mayúsculas (A-Z)
  </label>
  <label class="option-checkbox">
    <input type="checkbox" id="includeLowercase" checked>
    Minúsculas (a-z)
  </label>
  <label class="option-checkbox">
    <input type="checkbox" id="includeNumbers" checked>
    Números (0-9)
  </label>
  <label class="option-checkbox">
    <input type="checkbox" id="includeSymbols">
    Símbolos (!@#$...)
  </label>

  <button class="btn-primary" id="generateBtn">Generar Contraseña</button>
  <button class="btn-secondary" id="copyBtn">Copiar</button>

</main>

<script src="/src/scripts/generadorDeContraseñas.js"></script>

</body>
</html>
